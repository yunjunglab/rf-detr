name: Integration Tests

on:
  push:
    branches: ["main", "release/*", "develop"]
  pull_request:
    branches: ["main", "release/*", "develop"]

permissions:
  contents: read

env:
  # UV_TORCH_BACKEND only works with 'uv pip' commands, not 'uv sync'.
  # Used by 'uv pip install torch torchvision' step to install CPU-only PyTorch.
  UV_TORCH_BACKEND: "cpu"

concurrency:
  group: plus-integration-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  try-all-models:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "macos-latest", "windows-latest"]
        python-version: ["3.10", "3.13"]
    timeout-minutes: 15
    steps:
      - name: 📥 Checkout the repository
        uses: actions/checkout@v6.0.1

      - name: 🐍 Install uv and set Python version ${{ matrix.python-version }}
        uses: astral-sh/setup-uv@v7.2.0
        with:
          python-version: ${{ matrix.python-version }}
          activate-environment: true

      - name: 🚀 Install Packages (plus extras)
        timeout-minutes: 5
        # Install PyTorch CPU-only first (UV_TORCH_BACKEND=cpu works with 'uv pip')
        run: uv pip install -e .[plus]

      - name: 🔎 Validate model instantiation and downloads
        run: python tests/try_instantiate_all_models.py

      - name: Minimize uv cache
        run: uv cache prune --ci
